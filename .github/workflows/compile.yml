name: Compile sing-box Rule-Set

on:
  push:
    paths:
      - 'block_src.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create temporary directory
        run: mkdir -p ./rule-set

      - name: Cache sing-box binary
        id: cache-sing-box
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          # Кэш будет обновляться только если вы вручную измените эту строку (например, при выходе новой версии)
          key: ${{ runner.os }}-sing-box-v1

      - name: Install sing-box
        # Этот шаг выполнится ТОЛЬКО если файла нет в кэше
        if: steps.cache-sing-box.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://sing-box.app/install.sh | sudo sh
          sing-box version

      - name: Dynamic Download, Merge and Compile
        run: |
          # 1. Читаем список категорий из вашего block_src.json
          CATEGORIES=$(jq -r '.remote_categories[]?' ./block_src.json)
          
          # Создаем массив для путей к декомпилированным JSON-файлам
          JSON_FILES=("./block_src.json")

          # 2. Перебираем каждую категорию в цикле
          for CAT in $CATEGORIES; do
            echo "Processing remote category: $CAT"
            
            # Скачиваем бинарный .srs файл
            curl -L -s -o "./rule-set/${CAT}.srs" "https://githubusercontent.com{CAT}.srs"
            
            # Декомпилируем его в текст
            sing-box rule-set decompile --output "./rule-set/${CAT}.json" "./rule-set/${CAT}.srs"
            
            # Добавляем путь к файлу в список для склейки
            JSON_FILES+=("./rule-set/${CAT}.json")
          done

          # 3. Склеиваем правила из вашего исходника и всех скачанных категорий
          # Конструкция ${JSON_FILES[@]} автоматически подставит пути ко всем файлам
          jq -s '
            {
              version: 1,
              rules: ([.[] | .rules[]?] | flatten)
            }
          ' "${JSON_FILES[@]}" > ./merged_source.json

          # 4. Компилируем финальный монолитный .srs файл
          sing-box rule-set compile --output ./block-rules.srs ./merged_source.json

      - name: Clean up temporary files
        run: rm -rf ./rule-set ./merged_source.json

      - name: Commit and Push compiled SRS
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add block-rules.srs
          git diff-index --quiet HEAD || git commit -m "Automated build: Update block-rules.srs"
          git push
