name: Compile sing-box Rule-Set

on:
  push:
    paths:
      - '*_src.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache sing-box binary
        id: cache-sing-box
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: ${{ runner.os }}-sing-box-v1

      - name: Cache sing-box binary
        id: cache-sing-box
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          # Кэш будет обновляться только если вы вручную измените эту строку (например, при выходе новой версии)
          key: ${{ runner.os }}-sing-box-v1

      - name: Install sing-box (if not cached)
        if: steps.cache-sing-box.outputs.cache-hit != 'true'
        run: curl -fsSL https://sing-box.app/install.sh | sudo sh
        
      - name: Process All Source Files
        run: |
          
          # Находим все файлы в корне репозитория, имя которых заканчивается на _src.json
          SRC_FILES=$(ls *_src.json 2>/dev/null)

          if [ -z "$SRC_FILES" ]; then
            echo "No source files (*_src.json) found!"
            exit 0
          fi

          # Перебираем каждый найденный файл исходника (например, block_src.json, bypass_src.json)
          for SRC_FILE in $SRC_FILES; do
            echo "=========================================="
            echo "STARTING PROCESSING FOR: $SRC_FILE"
            echo "=========================================="
            
            # Определяем имя итогового бинарного файла (заменяем _src.json на -rules.srs)
            # block_src.json -> block-rules.srs
            # bypass_src.json -> bypass-rules.srs
            OUTPUT_NAME=$(echo "$SRC_FILE" | sed 's/_src.json/-rules.srs/')

            # Создаем чистую временную папку для удаленных категорий этого файла
            rm -rf ./rule-set && mkdir -p ./rule-set
            
            # Базовый массив для склейки JSON (начинается с текущего исходника)
            JSON_FILES=("./$SRC_FILE")

            # Читаем список категорий из текущего файла
            CATEGORIES=$(jq -r '.remote_categories[]?' "./$SRC_FILE" | tr -d '\r')

            for CAT in $CATEGORIES; do
              CAT=$(echo "$CAT" | xargs)
              if [ -z "$CAT" ]; then continue; fi

              echo "Processing remote category: '${CAT}'"
              DOWNLOAD_URL="https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/${CAT}.srs"
              echo "--> Attempting to download from: $DOWNLOAD_URL"

              curl -f -L -s --connect-timeout 10 -o "./rule-set/${CAT}.srs" "$DOWNLOAD_URL"

              if [ $? -ne 0 ] || [ ! -s "./rule-set/${CAT}.srs" ]; then
                echo "ERROR: Failed to download category '${CAT}' for $SRC_FILE"
                exit 1
              fi

              sing-box rule-set decompile --output "./rule-set/${CAT}.json" "./rule-set/${CAT}.srs"
              JSON_FILES+=("./rule-set/${CAT}.json")
            done

            echo "Merging components for $OUTPUT_NAME..."
            jq -s '
              {
                version: 1,
                rules: ([.[] | .rules[]?] | flatten)
              }
            ' "${JSON_FILES[@]}" > ./merged_source.json

            echo "Compiling $OUTPUT_NAME..."
            sing-box rule-set compile --output "./$OUTPUT_NAME" ./merged_source.json
            
            # Очищаем временные файлы перед переходом к следующему файлу в цикле
            rm -rf ./rule-set ./merged_source.json
          done

      - name: Clean up temporary files
        run: rm -rf ./rule-set ./merged_source.json

      - name: Commit and Push compiled SRS
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add block-rules.srs
          git diff-index --quiet HEAD || git commit -m "Automated build: Update block-rules.srs"
          git push
